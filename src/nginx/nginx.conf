worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── 로그 ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Rate Limiting ─────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    limit_req_zone $binary_remote_addr zone=tiles:10m rate=200r/s;

    # ── Gzip ──────────────────────────────────────────────
    gzip on;
    gzip_types application/json application/geo+json text/plain;
    gzip_min_length 1000;

    # ── Tile cache ────────────────────────────────────────
    proxy_cache_path /var/cache/nginx/tiles levels=1:2
                     keys_zone=tile_cache:10m max_size=1g inactive=1h;

    # ── Upstream ──────────────────────────────────────────
    upstream backend {
        server energy-hub-backend:8000;
    }

    upstream frontend {
        server energy-hub-frontend:5173;
    }

    upstream martin {
        server energy-hub-martin:3000;
    }

    server {
        listen 80;
        server_name _;

        # ── 보안 헤더 ────────────────────────────────────
        add_header X-Content-Type-Options    nosniff always;
        add_header X-Frame-Options           DENY always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── Health ────────────────────────────────────────
        location /health {
            proxy_pass http://backend;
        }

        # ── Vector Tiles (Martin) ─────────────────────────
        location /tiles/ {
            limit_req zone=tiles burst=300 nodelay;

            proxy_pass http://martin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Accept-Encoding "";

            proxy_cache tile_cache;
            proxy_cache_valid 200 1h;
            proxy_cache_use_stale error timeout updating;
            add_header X-Cache-Status $upstream_cache_status;
            add_header Access-Control-Allow-Origin "*";
            add_header Cache-Control "public, max-age=3600";
        }

        # ── API v1 ───────────────────────────────────────
        location /api/v1/ {
            limit_req zone=api burst=100 nodelay;

            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 30s;
            proxy_connect_timeout 5s;
        }

        # ── Docs ─────────────────────────────────────────
        location /docs {
            proxy_pass http://backend;
        }

        location /redoc {
            proxy_pass http://backend;
        }

        location /openapi.json {
            proxy_pass http://backend;
        }

        # ── Frontend (Vite dev) ────────────────────────────
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_http_version 1.1;
        }
    }
}
